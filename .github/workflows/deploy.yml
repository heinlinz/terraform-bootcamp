name: Terraform CI

on:
  workflow_dispatch:
    inputs:
      stage:
        description: "Manual stage to run"
        required: true
        type: choice
        options:
          - validate
          - plan
          - apply
        default: validate

permissions:
  contents: read

env:
  AWS_REGION: ap-southeast-1
  TF_VERSION: "1.12.0"
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_WORKING_DIR: ./
concurrency:
  group: terraform-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    if: github.event.inputs.stage == 'validate'

    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Init (no backend)
        run: terraform init -backend=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Validate
        run: terraform validate -no-color
        working-directory: ${{ env.TF_WORKING_DIR }}

  plan:
    name: Plan
    runs-on: ubuntu-latest
    if: github.event.inputs.stage == 'plan' || github.event.inputs.stage == 'apply'
    environment: develop

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create terraform.tfvars
        run: |
          cat <<EOF > terraform.tfvars
          ${{ secrets.TFVARS_FILE }}
          EOF
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Init
        run: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Plan
        run: terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}

  apply:
    name: Apply
    runs-on: ubuntu-latest
    if: github.event.inputs.stage == 'apply'
    environment: develop

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Init
        run: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Apply
        run: terraform apply -auto-approve
        working-directory: ${{ env.TF_WORKING_DIR }}
